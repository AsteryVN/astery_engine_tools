name: pr-guard

# Lightweight PR-time guard for the Tauri shell + Go daemon. Linux-only:
# catches the >90% of breakage that would otherwise only surface on
# tag-triggered installer matrix runs. Total budget < 4 min on
# ubuntu-latest. Full per-OS installer build runs only on tag push.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: pr-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: go build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  ts:
    name: tauri-app typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tauri-app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: tauri-app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm vitest run
      - name: IPC token invariant grep
        shell: bash
        run: |
          if grep -rnE "@tauri-apps/plugin-fs|localStorage|sessionStorage|indexedDB" src/; then
            echo "::error::IPC token invariant violated — see ipc.ts header comment"
            exit 1
          fi

  rust:
    name: src-tauri cargo check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tauri-app/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev pkg-config build-essential
      - name: Stage placeholder sidecar binary (cargo check only)
        shell: bash
        run: |
          mkdir -p binaries
          # cargo check doesn't actually need the binary to exist for compile,
          # but tauri-build's externalBin path resolution does. Stage an
          # empty placeholder per-target so the check passes.
          for t in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-apple-darwin aarch64-apple-darwin x86_64-pc-windows-msvc; do
            : > "binaries/engine-toold-${t}"
          done
          : > "binaries/engine-toold-x86_64-pc-windows-msvc.exe"
      - run: cargo check
      - name: Validate tauri.conf.json schema
        run: |
          # Minimal validation: parse + check required fields. Full schema
          # validation lives in `pnpm tauri info` which the ts job covers.
          python3 -c "import json,sys; c=json.load(open('tauri.conf.json')); assert c['identifier'] and c['bundle']['targets']"
