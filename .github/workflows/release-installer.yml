name: release-installer

# Release pipeline for the Tauri shell installers (v0.2.x+). Sibling to
# release.yml — that one ships headless engine-toold archives, this one
# ships native installers (.dmg/.msi/.AppImage) that bundle the daemon as
# a Tauri 2 sidecar. Tag-triggered only; PRs run the lighter
# release-installer-pr-guard job (see release-installer-pr.yml).
#
# Filename convention (mirrored by the cloud manifest endpoint):
#   astery-engine-tools_${version}_${os}_${arch}_installer.${ext}
# os ∈ {darwin, windows, linux}, arch ∈ {x64, arm64}, ext ∈ {dmg, msi, AppImage}.
#
# Installer bundles are signed with the Tauri updater key
# (TAURI_SIGNING_PRIVATE_KEY) starting v0.2.1 so the updater plugin can
# verify a tampered latest.json cannot trigger an install. Apple
# notarization (APPLE_TEAM_ID + APPLE_API_KEY_*) and Windows Authenticode
# (WINDOWS_PFX_BASE64) are still a follow-up — see docs/RELEASE.md
# §code-signing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (must already exist, e.g. v0.2.0)"
        type: string
        required: true

permissions:
  contents: write

concurrency:
  group: release-installer-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: installer ${{ matrix.os }}_${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # darwin_x64 (macos-13) skipped — macos-13 runners are not allocated on
          # this GitHub plan / org and queued jobs sit indefinitely. darwin_arm64
          # (macos-14, Apple Silicon) covers Mac users with arm64; darwin_x64
          # users get the headless daemon archive from release.yml until macos-15
          # (or a self-hosted runner) is available. Track in TODO; cloud manifest
          # darwin_x64 installer URL will 404 — same situation as windows_arm64.
          - { os: darwin,  arch: arm64, runner: macos-14,        rust_target: aarch64-apple-darwin,       go_goos: darwin,  go_goarch: arm64, ext: dmg }
          - { os: windows, arch: x64,   runner: windows-latest,  rust_target: x86_64-pc-windows-msvc,     go_goos: windows, go_goarch: amd64, ext: msi }
          - { os: linux,   arch: x64,   runner: ubuntu-24.04,    rust_target: x86_64-unknown-linux-gnu,   go_goos: linux,   go_goarch: amd64, ext: AppImage }
          - { os: linux,   arch: arm64, runner: ubuntu-24.04-arm, rust_target: aarch64-unknown-linux-gnu, go_goos: linux,   go_goarch: arm64, ext: AppImage }
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build engine-toold sidecar binary
        shell: bash
        env:
          GOOS: ${{ matrix.go_goos }}
          GOARCH: ${{ matrix.go_goarch }}
          CGO_ENABLED: "0"
        run: |
          version="${{ steps.ver.outputs.version }}"
          mkdir -p tauri-app/src-tauri/binaries
          out="tauri-app/src-tauri/binaries/engine-toold-${{ matrix.rust_target }}"
          if [ "${{ matrix.os }}" = "windows" ]; then out="${out}.exe"; fi
          go build -trimpath \
            -ldflags "-s -w -X main.version=${version}" \
            -o "${out}" ./cmd/engine-toold
          ls -lh "${out}"

      - name: Assert externalBin staged
        shell: bash
        run: |
          target="${{ matrix.rust_target }}"
          if [ "${{ matrix.os }}" = "windows" ]; then suffix=".exe"; else suffix=""; fi
          test -f "tauri-app/src-tauri/binaries/engine-toold-${target}${suffix}" \
            || (echo "::error::sidecar binary missing for ${target}" && exit 1)

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Linux build deps
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev pkg-config build-essential

      - uses: pnpm/action-setup@v4
        with:
          version: "9"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: tauri-app/pnpm-lock.yaml

      - name: pnpm install
        working-directory: tauri-app
        run: pnpm install --frozen-lockfile

      - name: tauri build
        working-directory: tauri-app
        env:
          # Signing the updater bundle / installer with the ed25519 key gates
          # the latest.json flow — without these, .sig files are not produced
          # and the publish job's compose step will fail. Repo secrets are set
          # by the maintainer per docs/AUTO_UPDATE_SETUP.md.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Stage installer + updater bundle
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          os="${{ matrix.os }}"
          arch="${{ matrix.arch }}"
          ext="${{ matrix.ext }}"
          target="${{ matrix.rust_target }}"
          out_dir="dist-installer"
          mkdir -p "$out_dir"

          # 1) The user-facing installer bundle (.dmg/.msi/.AppImage).
          name="astery-engine-tools_${version}_${os}_${arch}_installer.${ext}"
          case "$ext" in
            dmg)      installer_src="tauri-app/src-tauri/target/${target}/release/bundle/dmg" ;;
            msi)      installer_src="tauri-app/src-tauri/target/${target}/release/bundle/msi" ;;
            AppImage) installer_src="tauri-app/src-tauri/target/${target}/release/bundle/appimage" ;;
            *) echo "::error::unknown ext $ext" && exit 1 ;;
          esac
          found="$(find "$installer_src" -maxdepth 1 -type f -name "*.${ext}" | head -n1)"
          test -n "$found" || (echo "::error::no $ext produced under $installer_src" && exit 1)
          cp "$found" "$out_dir/$name"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$out_dir" && sha256sum "$name" > "${name}.sha256")
          else
            (cd "$out_dir" && shasum -a 256 "$name" > "${name}.sha256")
          fi

          # 2) Updater bundle + signature.
          #
          # On Linux/Windows the user-facing installer file is *also* the
          # updater bundle — Tauri writes the .sig sidecar next to it. We
          # publish the .sig under the renamed installer name so latest.json
          # can point to one URL.
          #
          # On macOS the updater bundle is a separate `.app.tar.gz` produced
          # under bundle/macos/ alongside the .dmg. We rename it to
          # `_updater.app.tar.gz` so its URL stays predictable.
          updater_url=""
          updater_sig=""
          case "$os" in
            darwin)
              updater_src="tauri-app/src-tauri/target/${target}/release/bundle/macos"
              found_app="$(find "$updater_src" -maxdepth 1 -type f -name '*.app.tar.gz' | head -n1)"
              found_sig="$(find "$updater_src" -maxdepth 1 -type f -name '*.app.tar.gz.sig' | head -n1)"
              test -n "$found_app" || (echo "::error::no .app.tar.gz produced under $updater_src — check tauri.conf.json bundle.createUpdaterArtifacts=true (Tauri 2 does NOT auto-emit updater bundles without it)" && exit 1)
              test -n "$found_sig" || (echo "::error::no .app.tar.gz.sig produced under $updater_src — createUpdaterArtifacts is set but TAURI_SIGNING_PRIVATE_KEY is missing/empty" && exit 1)
              updater_name="astery-engine-tools_${version}_${os}_${arch}_updater.app.tar.gz"
              cp "$found_app" "$out_dir/$updater_name"
              cp "$found_sig" "$out_dir/${updater_name}.sig"
              updater_url="$updater_name"
              updater_sig="${updater_name}.sig"
              ;;
            linux|windows)
              found_sig="$(find "$installer_src" -maxdepth 1 -type f -name "*.${ext}.sig" | head -n1)"
              test -n "$found_sig" || (echo "::error::no .${ext}.sig produced under $installer_src — check tauri.conf.json bundle.createUpdaterArtifacts=true AND TAURI_SIGNING_PRIVATE_KEY is set" && exit 1)
              cp "$found_sig" "$out_dir/${name}.sig"
              updater_url="$name"
              updater_sig="${name}.sig"
              ;;
            *) echo "::error::unknown os $os" && exit 1 ;;
          esac

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "dir=$out_dir" >> "$GITHUB_OUTPUT"
          echo "updater_url=$updater_url" >> "$GITHUB_OUTPUT"
          echo "updater_sig=$updater_sig" >> "$GITHUB_OUTPUT"
          ls -lh "$out_dir"

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ steps.stage.outputs.dir }}/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish installers
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || inputs.version != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist-installer
          pattern: installer-*
          merge-multiple: true

      - name: Aggregate SHA256SUMS
        working-directory: dist-installer
        run: |
          : > SHA256SUMS-installers
          for f in *.sha256; do
            cat "$f" >> SHA256SUMS-installers
          done
          cat SHA256SUMS-installers

      - name: Compose latest.json
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ inputs.version != '' && inputs.version || github.ref_name }}"
          version="${tag#v}"
          base="https://github.com/${REPO}/releases/download/${tag}"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Map matrix os/arch onto Tauri 2 platform identifiers + the
          # download URL the updater bundle was uploaded under. Keep this
          # table in sync with the build matrix.
          declare -A platforms=(
            ["darwin-aarch64"]="astery-engine-tools_${tag}_darwin_arm64_updater.app.tar.gz"
            ["windows-x86_64"]="astery-engine-tools_${tag}_windows_x64_installer.msi"
            ["linux-x86_64"]="astery-engine-tools_${tag}_linux_x64_installer.AppImage"
            ["linux-aarch64"]="astery-engine-tools_${tag}_linux_arm64_installer.AppImage"
          )

          # Build the platforms object incrementally with jq so signature
          # contents (multi-line minisign blobs) are escaped correctly.
          platforms_json='{}'
          for plat in "${!platforms[@]}"; do
            file="${platforms[$plat]}"
            sig_path="dist-installer/${file}.sig"
            if [ ! -f "$sig_path" ]; then
              echo "::error::missing signature for $plat at $sig_path"
              exit 1
            fi
            sig="$(cat "$sig_path")"
            platforms_json="$(jq -n \
              --argjson cur "$platforms_json" \
              --arg key "$plat" \
              --arg url "${base}/${file}" \
              --arg sig "$sig" \
              '$cur + {($key): {signature: $sig, url: $url}}')"
          done

          # Read release notes from the release body if available; fall back
          # to a stable string so the manifest is still valid on first push.
          notes="$(gh release view "$tag" --json body --jq '.body' 2>/dev/null || true)"
          if [ -z "$notes" ]; then
            notes="Astery Engine Tools ${version}"
          fi

          jq -n \
            --arg version "$version" \
            --arg notes "$notes" \
            --arg pub_date "$pub_date" \
            --argjson platforms "$platforms_json" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > dist-installer/latest.json

          cat dist-installer/latest.json

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ inputs.version != '' && inputs.version || github.ref_name }}"
          # Upload installers, updater bundles, signature sidecars, sums and
          # the manifest. shopt -s nullglob so missing patterns (e.g. no .dmg
          # on a linux-only build) don't abort.
          shopt -s nullglob
          assets=(
            dist-installer/*.dmg
            dist-installer/*.msi
            dist-installer/*.AppImage
            dist-installer/*.app.tar.gz
            dist-installer/*.sig
            dist-installer/SHA256SUMS-installers
            dist-installer/latest.json
          )
          gh release upload "$tag" "${assets[@]}" --clobber
